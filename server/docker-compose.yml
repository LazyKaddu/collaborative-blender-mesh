version: '3.8'

services:
  # ─── REDIS INSTANCE ───
  redis:
    image: redis:7-alpine
    container_name: collab_redis_cache
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - collab_network

  # ─── TYPESCRIPT COLLAB SERVER ───
  server:
    build:
      context: .
      dockerfile: DOCKERFILE
    container_name: collab_mesh_server
    restart: always
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://redis:6379
      - PORT=${SERVER_PORT}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      # Alpine image uses 'wget' natively instead of 'curl' to keep image sizes tiny
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s 

    networks:
      - collab_network

volumes:
  redis_data:

networks:
  collab_network:
    driver: bridge